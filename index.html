<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Россильбер | Корпоративный портал проектов</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1e232d;
      --text: #f5f7fb;
      --muted: #aab3c2;
      --line: #2c3442;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1d2330 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 34px 20px 28px;
    }

    .header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      letter-spacing: .2em;
      text-transform: uppercase;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: clamp(14px, 2vw, 18px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: linear-gradient(170deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      padding: 16px;
      min-height: 118px;
      display: flex;
      gap: 12px;
      transition: .2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #3a4659;
      box-shadow: 0 8px 22px rgba(0, 0, 0, .28);
    }

    .icon { font-size: 28px; line-height: 1; }

    .card h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }

    .card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    footer {
      margin-top: 22px;
      border-top: 1px solid var(--line);
      color: #8893a6;
      padding-top: 14px;
      text-align: center;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Россильбер</h1>
      <div class="subtitle">Корпоративный портал</div>
    </header>

    <main class="grid" id="departmentsGrid"></main>

    <footer>разработал Патрушев Е.</footer>
  </div>

  <script>
    const departments = [
      { key: 'beloretsk', icon: '🏭', name: 'Производство Белорецк', note: 'Управление производством' },
      { key: 'technopark', icon: '🏗️', name: 'Производство Технопарк', note: 'Инновационные линии' },
      { key: 'rnd', icon: '🔬', name: 'RnD и Технология', note: 'Исследования и разработка' },
      { key: 'sales', icon: '📈', name: 'Продажи', note: 'Коммерческий блок' },
      { key: 'supply', icon: '📦', name: 'Снабжение', note: 'Закупки и логистика' },
      { key: 'development', icon: '🚀', name: 'Развитие', note: 'Стратегическое планирование' },
      { key: 'efficiency', icon: '⚙️', name: 'Операционная эффективность', note: 'Оптимизация процессов' },
      { key: 'hr', icon: '👥', name: 'Персонал', note: 'Департамент персонала' },
      { key: 'finance', icon: '💰', name: 'Финансы', note: 'Отчетность и контроль' },
      { key: 'security', icon: '🛡️', name: 'Безопасность', note: 'Защита активов' },
      { key: 'hse', icon: '🦺', name: 'СОТПБ и ЭБ', note: 'Охрана труда и экология' },
      { key: 'legal', icon: '⚖️', name: 'Право', note: 'Юридический департамент' },
      { key: 'it', icon: '💻', name: 'ИТ', note: 'Инфраструктура и сервисы' },
      { key: 'admin', icon: '📁', name: 'Администрирование', note: 'Обеспечение офиса' },
      { key: 'tech_policy', icon: '🛠️', name: 'Техническая политика', note: 'Модернизация' },
      { key: 'ai', icon: '🧠', name: 'Искусственный интеллект', note: 'Автоматизация и ИИ' }
    ];

    const grid = document.getElementById('departmentsGrid');

    departments.forEach((department) => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = `departments.html?dept=${department.key}`;
      card.innerHTML = `
        <div class="icon">${department.icon}</div>
        <div>
          <h2>${department.name}</h2>
          <p>${department.note}</p>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
